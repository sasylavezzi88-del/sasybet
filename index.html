        :root {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;

            --neon-blue: #00d2ff;
            --text-main: #f8fafc;

            color: var(--text-main);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            margin-bottom: 40px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        .select-wrapper {
            position: relative;
        }

        select, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background-color: var(--bg-principal);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 12px;
            color: var(--text-muted);
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        select:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.2);
        }

        button {
            background-color: var(--neon-green);
            color: var(--bg-principal);
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            filter: brightness(1.2);
        }

        button:disabled {
            background-color: #475569;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-principal);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            font-weight: bold;
            font-size: 18px;
        }

        .match-header span {
            flex: 1;
            text-align: center;
        }

        .vs {
            color: var(--neon-blue);
            font-size: 14px;
        }

        .results-container {
            display: none;
            margin-top: 20px;
        }

        .prediction-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media(min-width: 480px) {
            .prediction-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card-pred {
            background: var(--bg-principal);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--neon-blue);
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .card-pred.combo {
            border-left-color: var(--neon-green);
        }

        .card-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
        }

</head>

    // Stato temporaneo per memorizzare i dati delle squadre caricate nella sessione corrente
    let currentLoadedTeams = [];

    async function fetchAPIData(leagueKey) {
        const compCode = leagueMapping[leagueKey];
        if (!compCode) return null;
        try {
            const response = await fetch(`${API_CONFIG.baseUrl}${compCode}/teams`, {
                headers: { 'X-Auth-Token': API_CONFIG.apiKey }
            });
            if (!response.ok) throw new Error("Errore chiamata API o limite superato");
            const data = await response.json();
            
            // UNIONE LOGICA (MERGE): Agganciamo i dati reali del localDatabase alle squadre live dell'API
            return data.teams.map(t => {
                const apiId = t.tla ? t.tla.toLowerCase() : String(t.id);
                const apiName = t.shortName || t.name;

                // Cerca se esiste la squadra nel tuo database locale per prenderne le stats reali
                const localMatch = localDatabase[leagueKey].find(localTeam => 
                    localTeam.id === apiId || apiName.toLowerCase().includes(localTeam.name.toLowerCase())
                );

                if (localMatch) {
                    return {
                        id: apiId,
                        name: apiName,
                        winRate: localMatch.winRate,
                        drawRate: localMatch.drawRate,
                        loseRate: localMatch.loseRate,
                        avgScored: localMatch.avgScored,
                        avgConceded: localMatch.avgConceded
                    };
                } else {
                    // Fallback di sicurezza se la squadra è nuova o non mappata
                    return {
                        id: apiId,
                        name: apiName,
                        winRate: 0.35, drawRate: 0.30, loseRate: 0.35, avgScored: 1.30, avgConceded: 1.30
                    };
                }
            });
        } catch (error) {
            console.error("Impossibile caricare i dati live. Uso database locale di riserva.", error);
            return null;
        }
    }

            const cachedData = localStorage.getItem(cacheKey);
            const cachedTime = localStorage.getItem(cacheTimeKey);
            
            // Durata della cache impostata a 2 ore per azzerare i blocchi API
            const cacheDuration = 2 * 60 * 60 * 1000; 
            const isCacheValid = cachedTime && (Date.now() - cachedTime < cacheDuration);

            if (isCacheValid && cachedData) {
                currentLoadedTeams = JSON.parse(cachedData);
                console.log(`[SasyBet Cache] Dati di ${leagueKey} caricati dalla memoria locale del browser.`);
            } else {
                const apiTeams = await fetchAPIData(leagueKey);
                if (apiTeams && apiTeams.length > 0) {
                    currentLoadedTeams = apiTeams;
                    localStorage.setItem(cacheKey, JSON.stringify(currentLoadedTeams));
                    localStorage.setItem(cacheTimeKey, Date.now());
                    console.log(`[SasyBet API] Dati di ${leagueKey} scaricati correttamente e salvati in Cache.`);
                } else {
                    currentLoadedTeams = localDatabase[leagueKey] || [];
                    console.log(`[SasyBet Fallback] API bloccata o offline. Caricato database statico.`);
                }
            }
        } else {
            currentLoadedTeams = localDatabase[leagueKey] || [];
        }

        // Ordina alfabeticamente per comodità dell'utente
        currentLoadedTeams.sort((a, b) => a.name.localeCompare(b.name));

        populateSelect(homeSelect, currentLoadedTeams);
        populateSelect(awaySelect, currentLoadedTeams);

        homeSelect.disabled = false;
        awaySelect.disabled = false;
        predictBtn.disabled = false;
    }

    function populateSelect(selectElement, teams) {
        selectElement.innerHTML = '<option value="">-- Seleziona Squadra --</option>';
        teams.forEach(team => {
            const option = document.createElement('option');
            option.value = team.id;
            option.textContent = team.name;
            selectElement.appendChild(option);
        });
    }

    function resetForm() {
        document.getElementById('homeTeam').innerHTML = '<option value="">Seleziona prima il campionato</option>';
        document.getElementById('awayTeam').innerHTML = '<option value="">Seleziona prima il campionato</option>';
        document.getElementById('homeTeam').disabled = true;
        document.getElementById('awayTeam').disabled = true;
        document.getElementById('predictBtn').disabled = true;
        document.getElementById('resultsContainer').style.display = 'none';
        currentLoadedTeams = [];
    }

    // ==========================================
    // FUNZIONE DI COERENZA LOGICA ANTIBUG
    // ==========================================
    function checkCoherence(outputs) {
        let { segno, doppiaChance, underOver, goalGoal, multigol, lineaAlt } = outputs;

        if (segno === "X" && goalGoal === "NO GOAL") {
            underOver = "UNDER 2.5";
            if (multigol === "2-4 GOL" || multigol === "3-5 GOL") {
                multigol = "1-2 GOL"; 
            }
            lineaAlt = "UNDER 3.5";
        }

        if (segno === "X" && underOver === "OVER 2.5") {
            goalGoal = "GOAL";
            if (multigol === "1-2 GOL") {
                multigol = "2-4 GOL";
            }
        }

        if (underOver === "OVER 2.5" && multigol === "1-2 GOL") {
            multigol = "2-4 GOL";
        }
        if (underOver === "UNDER 2.5" && multigol === "3-5 GOL") {
            multigol = "1-3 GOL";
        }

        return { segno, doppiaChance, underOver, goalGoal, multigol, lineaAlt };
    }

    function generatePrediction() {
        const homeId = document.getElementById('homeTeam').value;
        const awayId = document.getElementById('awayTeam').value;

        if (!homeId || !awayId) {
            alert("Seleziona entrambe le squadre!");
            return;
        }
        if (homeId === awayId) {
            alert("Scegli due squadre differenti!");
            return;
        }

        // Cerchiamo le squadre nell'array corrente caricato (che sia derivato da cache, API o localDB)
        const hPerf = currentLoadedTeams.find(t => t.id === homeId);
        const aPerf = currentLoadedTeams.find(t => t.id === awayId);

        if (hPerf && aPerf) {
            document.getElementById('lblHome').textContent = hPerf.name;
            document.getElementById('lblAway').textContent = aPerf.name;

            let segno = "X";
            let doppiaChance = "1X";
            const indiceAttacco = hPerf.winRate + (1 - aPerf.loseRate);

            if (indiceAttacco > 1.22) {
                segno = "1";
                doppiaChance = "1X";
            } else if (aPerf.winRate > 0.45 && hPerf.winRate < 0.35) {
                segno = "2";
                doppiaChance = "X2";
            } else {
                segno = "X";
                doppiaChance = (hPerf.winRate >= aPerf.winRate) ? "1X" : "X2";
            }

            const sommaGolAttesi = ((hPerf.avgScored + aPerf.avgConceded) / 2) + ((aPerf.avgScored + hPerf.avgConceded) / 2);
            let underOver = sommaGolAttesi >= 2.4 ? "OVER 2.5" : "UNDER 2.5";
            let goalGoal = (hPerf.avgScored > 1.2 && aPerf.avgScored > 1.2) ? "GOAL" : "NO GOAL";

            let multigol = "1-3 GOL";
            if (sommaGolAttesi >= 3.2) multigol = "3-5 GOL";
            else if (sommaGolAttesi >= 2.3) multigol = "2-4 GOL";
            else if (sommaGolAttesi < 1.6) multigol = "1-2 GOL";

            let lineaAlt = "OVER 1.5";
            if (sommaGolAttesi < 1.9) lineaAlt = "UNDER 3.5";
            if (sommaGolAttesi >= 3.6) lineaAlt = "OVER 3.5";

            // APPLICAZIONE FILTRO LOGICO DI COERENZA
            const cleaned = checkCoherence({ segno, doppiaChance, underOver, goalGoal, multigol, lineaAlt });

            // Creazione delle Combo basate sugli esiti ripuliti e corretti
            const comboGG = `${cleaned.doppiaChance} + ${cleaned.goalGoal}`;
            const comboUO = `${cleaned.doppiaChance} + ${cleaned.underOver}`;

            // Rendering a video
            document.getElementById('res1X2').textContent = cleaned.segno;
            document.getElementById('resDC').textContent = cleaned.doppiaChance;
            document.getElementById('resUO').textContent = cleaned.underOver;
            document.getElementById('resGG').textContent = cleaned.goalGoal;
            document.getElementById('resMG').textContent = cleaned.multigol;
            document.getElementById('resAlt').textContent = cleaned.lineaAlt;
            document.getElementById('resComboGG').textContent = comboGG;
            document.getElementById('resComboUO').textContent = comboUO;

            document.getElementById('resultsContainer').style.display = 'block';
            document.getElementById('resultsContainer').scrollIntoView({ behavior: 'smooth' });
        }
    }
</script>
